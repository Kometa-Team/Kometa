# yaml-language-server: $schema=../collection-schema.json
collections:

  # ---------------------------------------------------------------------------
  # tautulli_popular — items most-watched by users over a rolling window
  # Parameters:
  #   list_days    (int, default 30)  — how many days to look back
  #   list_size    (int, default 10)  — number of items to include
  #   list_minimum (int, default 0)   — minimum play-count/user threshold
  # ---------------------------------------------------------------------------
  Most Popular Movies (Last 30 Days):
    sync_mode: sync
    collection_order: custom
    tautulli_popular:
      list_days: 30
      list_size: 20
      list_minimum: 2

  Most Popular Movies (Last 7 Days):
    sync_mode: sync
    collection_order: custom
    tautulli_popular:
      list_days: 7
      list_size: 10
      list_minimum: 1

  Most Popular Movies (Last 90 Days):
    sync_mode: sync
    collection_order: custom
    tautulli_popular:
      list_days: 90
      list_size: 25
      list_minimum: 3

  # ---------------------------------------------------------------------------
  # tautulli_watched — items most-completed by users over a rolling window
  # Parameters:
  #   list_days    (int, default 30)  — how many days to look back
  #   list_size    (int, default 10)  — number of items to include
  #   list_minimum (int, default 0)   — minimum watch/play count threshold
  # ---------------------------------------------------------------------------
  Most Watched Movies (Last 30 Days):
    sync_mode: sync
    collection_order: custom
    tautulli_watched:
      list_days: 30
      list_size: 20
      list_minimum: 2

  Most Watched Movies (Last 7 Days):
    sync_mode: sync
    collection_order: custom
    tautulli_watched:
      list_days: 7
      list_size: 10
      list_minimum: 1

  Most Watched Movies (Last 90 Days):
    sync_mode: sync
    collection_order: custom
    tautulli_watched:
      list_days: 90
      list_size: 25
      list_minimum: 5
