# yaml-language-server: $schema=../json-schema/config-schema.json
#
# Kometa Comprehensive Prototype Configuration
# Exercises most schema features while remaining practical and lean (~200 lines)
#
# This config demonstrates:
# - Multiple Plex libraries with different configurations
# - All major API integrations
# - Collection/overlay/metadata file sources
# - Settings, operations, and scheduling
# - Webhook notifications
# - Per-library overrides

# ============================================================================
# REQUIRED SETTINGS
# ============================================================================

plex:
  url: http://192.168.1.12:32400
  token: YOUR_PLEX_TOKEN_HERE
  timeout: 60
  db_cache: 40
  verify_ssl: true

tmdb:
  apikey: YOUR_TMDB_API_KEY_HERE
  language: en
  cache_expiration: 60

# ============================================================================
# OPTIONAL API INTEGRATIONS
# ============================================================================

trakt:
  client_id: YOUR_TRAKT_CLIENT_ID
  client_secret: YOUR_TRAKT_CLIENT_SECRET
  pin: YOUR_TRAKT_PIN

mal:
  client_id: YOUR_MAL_CLIENT_ID
  client_secret: YOUR_MAL_CLIENT_SECRET

tautulli:
  url: http://192.168.1.12:8181
  apikey: YOUR_TAUTULLI_API_KEY

radarr:
  url: http://192.168.1.12:7878
  token: YOUR_RADARR_API_KEY
  add_missing: true
  add_existing: false
  ignore_cache: false
  upgrade_existing: false
  search: false
  root_folder_path: /data/movies
  monitor: true
  monitor_existing: false
  quality_profile: HD-1080p
  availability: released
  tag: example_tag
  radarr_path: /other/path/to/movies
  plex_path: /path/to/movies

sonarr:
  url: http://192.168.1.12:8989
  token: YOUR_SONARR_API_KEY
  add_missing: true
  add_existing: false
  ignore_cache: false
  upgrade_existing: false
  season_folder: true
  search: false
  cutoff_search: false
  root_folder_path: /data/tv
  monitor: all
  monitor_existing: false
  quality_profile: HD-1080p
  language_profile: English
  series_type: standard
  tag: example_tag
  cutoff: HD-1080p
  plex_path: /path/to/shows
  sonarr_path: /other/path/to/shows

mdblist:
  apikey: YOUR_MDBLIST_API_KEY

omdb:
  apikey: YOUR_OMDB_API_KEY

anidb:
  language: en
  cache_expiration: 60
  enable_mature: true

github:
  token: YOUR_GITHUB_PAT

notifiarr:
  apikey: YOUR_NOTIFIARR_API_KEY

gotify:
  url: http://192.168.1.12:80
  token: YOUR_GOTIFY_TOKEN

ntfy:
  url: http://192.168.1.12
  token: YOUR_NTFY_TOKEN
  topic: kometa-notifications

# ============================================================================
# GLOBAL WEBHOOKS
# ============================================================================

webhooks:
  version: https://webhook.example.com/version
  error: https://webhook.example.com/error
  run_start: https://webhook.example.com/start
  run_end: https://webhook.example.com/end
  changes: https://webhook.example.com/changes

# ============================================================================
# GLOBAL SETTINGS (can be overridden per library)
# ============================================================================

settings:
  cache: true
  cache_expiration: 60
  asset_directory: config/assets
  asset_folders: true
  asset_depth: 0
  create_asset_folders: false
  prioritize_assets: false
  dimensional_asset_rename: false
  download_url_assets: false
  sync_mode: append
  minimum_items: 1
  default_collection_order: release
  delete_below_minimum: true
  delete_not_scheduled: false
  auto_sort_hubs: sort_title
  run_again_delay: 2
  show_unmanaged: true
  show_unconfigured: false
  show_filtered: false
  show_missing: true
  show_missing_assets: true
  save_report: false
  tvdb_language: eng
  verify_ssl: true
  overlay_artwork_filetype: webp_lossy
  overlay_artwork_quality: 90
  run_order:
    - collections
    - metadata
    - overlays
    - operations

# ============================================================================
# PLAYLISTS (cross-library, global scope)
# ============================================================================

playlist_files:
  - file: json-schema/builders/playlists.yml
  - default: playlist
    template_variables:
      libraries: "Movies, TV Shows"

# ============================================================================
# LIBRARIES
# ============================================================================

