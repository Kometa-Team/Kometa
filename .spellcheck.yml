matrix:
- name: Markdown
  sources:
  - '**/*.md|!AGENTS.md|!**/MODULE.md|!config/**|!test_venv/**|!.direnv/**|!.github/**|!.mypy_cache/**|!.pytest_cache/**|!.ruff_cache/**|!.vscode/**|!docs/superpowers/**'
  - 'CHANGELOG'
  aspell:
    lang: en
    ignore-case: true
  dictionary:
    wordlists:
    - .github/.wordlist.txt
    encoding: utf-8
  pipeline:
  - pyspelling.filters.markdown:
  - pyspelling.filters.html:
      comments: false
      ignores:
      - code
      - pre
  default_encoding: utf-8
