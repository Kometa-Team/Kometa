name: Pyright Type Check

on:
  push:
    branches: [nightly]
  pull_request:
    branches: [nightly]

jobs:
  pyright:
    name: pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pyright-${{ hashFiles('**/requirements.txt', '**/dev-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyright

      - name: Check pyright ratcheting baseline
        # The gate ensures pyright error count never increases per file.
        # See scripts/pyright_baseline.py for full docs.
        run: |
          python scripts/pyright_baseline.py --check
