name: Docker WebUI Build

on:
  push:
    branches:
      - claude/kometa-webui-settings-bwn2r
  pull_request:
    branches:
      - claude/kometa-webui-settings-bwn2r

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kometa-webui

jobs:
  docker-build-webui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch push → fixed "webui-test" tag
            type=raw,value=webui-test,enable=${{ github.event_name == 'push' }}
            # PR → "pr-<number>" tag
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}
            # Always tag with the short SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and Push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.webui
          build-args: |
            BRANCH_NAME=${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write Job Summary
        if: always()
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.number }}"
          else
            TAG="webui-test"
          fi

          SHA_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## 🐳 Kometa WebUI Docker Image

          | | |
          |---|---|
          | **Registry** | \`$IMAGE\` |
          | **Tag** | \`$TAG\` |
          | **SHA tag** | \`$SHA_TAG\` |
          | **Platforms** | \`linux/amd64\`, \`linux/arm64\` |

          ### Pull & Run

          \`\`\`bash
          # Pull
          docker pull $IMAGE:$TAG

          # Run (mounts your local config directory, exposes port 7799)
          docker run -d \\
            --name kometa-webui \\
            -p 7799:7799 \\
            -v /path/to/your/config:/config \\
            $IMAGE:$TAG

          # Then open: http://<your-machine-ip>:7799
          \`\`\`

          > **Note:** Replace \`/path/to/your/config\` with the path to your Kometa \`config/\` directory.
          > The WebUI lets you pick a config file, set run options, and stream live logs from the browser.

          ### Pin to this exact build

          \`\`\`bash
          docker pull $IMAGE:$SHA_TAG
          \`\`\`
          EOF
