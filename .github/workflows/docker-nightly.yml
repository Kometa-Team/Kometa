name: Docker Nightly Build

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Master Release"]
    types:
      - completed

concurrency:
  group: docker-nightly
  cancel-in-progress: false

jobs:

  docker-build-nightly:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            tag-suffix: amd64
            cache-scope: docker-nightly-amd64
          - platform: linux/arm64
            tag-suffix: arm64
            cache-scope: docker-nightly-arm64
          - platform: linux/arm/v7
            tag-suffix: armv7
            cache-scope: docker-nightly-armv7
    steps:

      - name: Check Out Repo
        uses: actions/checkout@v7
        with:
          ref: nightly

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./Dockerfile
          build-args: |
            "BRANCH_NAME=nightly"
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:nightly-${{ matrix.tag-suffix }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}

  docker-publish-nightly:
    runs-on: ubuntu-latest
    needs: [ docker-build-nightly ]
    steps:

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish Multi-Arch Tag
        run: |
          docker buildx imagetools create \
            -t ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:nightly \
            ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:nightly-amd64 \
            ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:nightly-arm64 \
            ${{ vars.DOCKER_TEAM }}/${{ vars.DOCKER_REPO }}:nightly-armv7

  docker-nightly-notification:
    runs-on: ubuntu-latest
    needs: [ docker-build-nightly, docker-publish-nightly ]
    if: always()
    steps:

      - name: Discord Success Notification
        uses: Kometa-Team/discord-notifications@master
        if: ${{ needs.docker-build-nightly.result == 'success' && needs.docker-publish-nightly.result == 'success' }}
        with:
          webhook_id_token: ${{ secrets.BUILD_WEBHOOK }}
          title: "${{ vars.NAME }} nightly: ${{ vars.TEXT_SUCCESS }}"
          url: https://github.com/Kometa-Team/${{ vars.REPO_NAME }}/actions/runs/${{ github.run_id }}
          color: ${{ vars.COLOR_SUCCESS }}
          username: ${{ vars.BOT_NAME }}
          avatar_url: ${{ vars.BOT_IMAGE }}
          author: ${{ vars.DOCKER_NAME }}
          author_icon_url: ${{ vars.DOCKER_IMAGE }}

      - name: Discord Failure Notification
        uses: Kometa-Team/discord-notifications@master
        if: ${{ needs.docker-build-nightly.result == 'failure' || needs.docker-publish-nightly.result == 'failure' }}
        with:
          webhook_id_token: ${{ secrets.BUILD_WEBHOOK }}
          message: ${{ vars.BUILD_FAILURE_ROLE }}
          title: "${{ vars.NAME }} nightly: ${{ vars.TEXT_FAILURE }}"
          url: https://github.com/Kometa-Team/${{ vars.REPO_NAME }}/actions/runs/${{ github.run_id }}
          color: ${{ vars.COLOR_FAILURE }}
          username: ${{ vars.BOT_NAME }}
          avatar_url: ${{ vars.BOT_IMAGE }}
          author: ${{ vars.DOCKER_NAME }}
          author_icon_url: ${{ vars.DOCKER_IMAGE }}
